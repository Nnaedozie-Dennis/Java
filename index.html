
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .progress-bar { transition: width 0.4s ease; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen align-center flex items-center">

  <div class="max-w-2xl mx-auto p-6">

    <!-- Start Screen -->
    <div id="start-screen" class="text-center py-20">
      <h1 class="text-5xl font-bold mb-4">Java Quiz Game</h1>
      <p class="text-gray-300 text-2xl mb-2">Test your Java knowledge</p>
      <p class="text-gray-400 mb-8">10 Questions • 30 seconds each</p>
      <button onclick="startQuiz()" 
              class="bg-blue-600 hover:bg-blue-700 px-12 py-5 rounded-2xl text-2xl font-semibold transition">
        Start Quiz
      </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">


      <div class="flex justify-between">
      
      <!-- Progress -->
      <div class="mb-8 flex-1 mr-2">
        <div class="flex justify-between text-sm ">
          <span>Question <span id="current-q" class="text-blue-400">1</span>/10</span>
          <span>Score: <span id="score" class="text-green-400">0</span>/10</span>
        </div>
        <div class="h-2 bg-gray-800 rounded-full overflow-hidden mt-4">
          <div id="progress" class="progress-bar h-full bg-blue-500 w-0"></div>
        </div>
      </div>

      <!-- Timer -->
      <div class=" mb-4">
        <div id="timer" class="bg-gray-900 px-2 py-2 rounded-xl text-lg text-center  font-mono">
          30s
        </div>
      </div>
      </div>

      

      <!-- Question -->
      <div id="question-text" class="text-2xl font-semibold mb-2 min-h-[60px]"></div>

      <!-- Options -->
      <div id="options" class="space-y-3"></div>

      <!-- Feedback -->
      <div id="feedback" class="hidden  p-4 rounded-2xl"></div>

      <!-- Next Button -->
      <button onclick="nextQuestion()" id="next-btn"
              class="hidden w-full mt-3 bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-lg font-semibold">
        Next Question →
      </button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden text-center py-20">
      <h2 class="text-4xl font-bold mb-6">Quiz Completed!</h2>
      <div id="final-score" class="text-7xl font-bold text-blue-400 mb-2"></div>
      <p id="final-percentage" class="text-2xl text-gray-400 mb-8"></p>
      <p id="feedback-text" class="text-xl mb-10"></p>
      
      <button onclick="restartQuiz()" 
              class="bg-green-600 hover:bg-green-700 px-10 py-4 rounded-2xl text-xl font-semibold">
        Restart Quiz
      </button>
    </div>
  </div>

  <script>
    let currentQuestion = 0;
    let score = 0;
    let timer;
    let timeLeft = 30;
    let answered = false;

    const questions = [
      {
        question: "What is the size of int in Java?",
        options: ["2 bytes", "4 bytes", "8 bytes", "16 bytes"],
        answer: "B",
        explanation: "In Java, int is a 32-bit integer, which is 4 bytes."
      },
      {
        question: "Which keyword is used to define a class in Java?",
        options: ["define", "struct", "class", "object"],
        answer: "C",
        explanation: "'class' is the keyword used to declare a class."
      },
      {
        question: "Which data type stores true or false values?",
        options: ["int", "boolean", "char", "float"],
        answer: "B",
        explanation: "boolean is the data type that holds true or false."
      },
      {
        question: "What symbol is used for single-line comments?",
        options: ["/* */", "//", "#", "<!-- -->"],
        answer: "B",
        explanation: "// is used for single-line comments in Java."
      },
      {
        question: "Which operator is used for addition?",
        options: ["-", "*", "/", "+"],
        answer: "D",
        explanation: "+ is the addition operator."
      },
      {
        question: "What is the default value of a boolean variable?",
        options: ["true", "false", "0", "null"],
        answer: "B",
        explanation: "The default value of boolean in Java is false."
      },
      {
        question: "Which method is the entry point of a Java program?",
        options: ["start()", "main()", "run()", "execute()"],
        answer: "B",
        explanation: "public static void main(String[] args) is the entry point."
      },
      {
        question: "What does JVM stand for?",
        options: ["Java Virtual Machine", "Java Visual Model", "Java Verified Module", "Java Version Manager"],
        answer: "A",
        explanation: "JVM means Java Virtual Machine."
      },
      {
        question: "Which keyword is used to inherit a class?",
        options: ["extends", "implements", "inherits", "super"],
        answer: "A",
        explanation: "'extends' keyword is used for inheritance."
      },
      {
        question: "What is the correct way to declare a constant in Java?",
        options: ["const PI = 3.14;", "final double PI = 3.14;", "static PI = 3.14;", "constant PI = 3.14;"],
        answer: "B",
        explanation: "Use 'final' keyword to make a variable constant."
      }
    ];

    function startQuiz() {
      currentQuestion = 0;
      score = 0;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      showQuestion();
    }

    function startTimer() {
      timeLeft = 30;
      document.getElementById('timer').textContent = timeLeft + "s";
      
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft + "s";

        if (timeLeft <= 10) {
          document.getElementById('timer').classList.add('text-red-500');
        } else {
          document.getElementById('timer').classList.remove('text-red-500');
        }

        if (timeLeft <= 0) {
          clearInterval(timer);
          handleTimeout();
        }
      }, 1000);
    }

    function handleTimeout() {
      answered = true;
      showFeedback(false);
    }

    function showQuestion() {
      answered = false;
      const q = questions[currentQuestion];
      
      document.getElementById('current-q').textContent = currentQuestion + 1;
      document.getElementById('score').textContent = score;
      document.getElementById('question-text').innerHTML = `<span class="text-blue-400">${currentQuestion + 1}.</span> ${q.question}`;
      document.getElementById('progress').style.width = `${((currentQuestion + 1) / 10) * 100}%`;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((option, i) => {
        const letter = String.fromCharCode(65 + i);
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-5 rounded-2xl border border-gray-700 hover:border-blue-500 transition-all text-lg flex items-center`;
        btn.innerHTML = `<span class="font-bold text-blue-400 mr-4">${letter}.</span> ${option}`;
        btn.onclick = () => selectAnswer(letter, btn);
        optionsDiv.appendChild(btn);
      });

      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');

      startTimer();
    }

    function selectAnswer(selectedLetter, buttonElement) {
      if (answered) return;
      answered = true;
      clearInterval(timer);

      const q = questions[currentQuestion];
      const isCorrect = selectedLetter === q.answer;

      if (isCorrect) score++;

      // Highlight correct and wrong answers
      const buttons = document.querySelectorAll('#options button');
      buttons.forEach(btn => {
        const letter = btn.textContent.charAt(0);
        if (letter === q.answer) {
          btn.classList.add('border-green-500', 'bg-green-900');
        } else if (letter === selectedLetter) {
          btn.classList.add('border-red-500', 'bg-red-900');
        }
      });

      showFeedback(isCorrect);
    }

    function showFeedback(isCorrect) {
      const q = questions[currentQuestion];
      const feedbackDiv = document.getElementById('feedback');
      
      feedbackDiv.classList.remove('hidden');
      feedbackDiv.innerHTML = `
        <p class="${isCorrect ? 'text-green-400' : 'text-red-400'} font-semibold text-xl mb-3">
          ${isCorrect ? '✅ Correct!' : '❌ Wrong!'}
        </p>
        <p class="text-gray-300">${q.explanation}</p>
      `;

      document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      clearInterval(timer);
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');

      const percentage = Math.round((score / 10) * 100);
      
      document.getElementById('final-score').textContent = score + "/10";
      document.getElementById('final-percentage').textContent = percentage + "%";

      const feedbackText = document.getElementById('feedback-text');
      if (percentage >= 80) {
        feedbackText.textContent = "Excellent! You're a Java Champion! 🔥";
        feedbackText.className = "text-xl text-green-400";
      } else if (percentage >= 60) {
        feedbackText.textContent = "Good Job! Keep practicing.";
      } else {
        feedbackText.textContent = "Keep learning! You'll improve with time.";
      }
    }

    function restartQuiz() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }
  </script>
</body>
</html>
